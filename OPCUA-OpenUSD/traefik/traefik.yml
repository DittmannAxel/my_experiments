api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

# File provider only.
#
# We explicitly do NOT use the Docker provider here. Docker 29 removed
# support for API versions below 1.40, and the docker SDK used by Traefik's
# Docker provider tries to negotiate via /v1.24/info first, which the
# daemon now rejects. Using the file provider sidesteps that entirely; all
# routes are declared in traefik/dynamic.yml.
providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog: {}
