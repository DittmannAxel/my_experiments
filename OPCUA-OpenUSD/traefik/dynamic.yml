tls:
  certificates:
    - certFile: /etc/traefik/certs/stack.local.crt
      keyFile: /etc/traefik/certs/stack.local.key
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/stack.local.crt
        keyFile: /etc/traefik/certs/stack.local.key

# All routes declared here. As phases come online, append to `routers` and
# `services` below. Backends are reachable via container DNS on the `stack`
# network (the docker-compose network name).
http:
  routers:
    landing:
      rule: "Host(`stack.local`) && PathPrefix(`/`)"
      service: landing
      priority: 1
      entryPoints:
        - websecure
      tls: {}

    dashboard:
      rule: "Host(`stack.local`) && PathPrefix(`/dashboard`)"
      service: dashboard
      priority: 100
      entryPoints: [websecure]
      tls: {}
      middlewares:
        - dashboard-strip

    # ──────────── Phase 1b: Node-RED ────────────
    nodered:
      rule: "Host(`stack.local`) && PathPrefix(`/nodered`)"
      service: nodered
      priority: 100
      entryPoints: [websecure]
      tls: {}

    # ──────────── Phase 3: Grafana ────────────
    grafana:
      rule: "Host(`stack.local`) && PathPrefix(`/grafana`)"
      service: grafana
      priority: 100
      entryPoints: [websecure]
      tls: {}

    # ──────────── Phase 4: Omniverse Kit ────────────
    # usd:
    #   rule: "Host(`stack.local`) && PathPrefix(`/usd`)"
    #   service: usd
    #   entryPoints: [websecure]
    #   tls: {}

    # ──────────── Phase 5: rag-mcp ────────────
    spec:
      rule: "Host(`stack.local`) && PathPrefix(`/spec`)"
      service: spec
      priority: 100
      entryPoints: [websecure]
      tls: {}
      middlewares:
        - spec-strip

  services:
    landing:
      loadBalancer:
        servers:
          - url: "http://landing-page:80"

    dashboard:
      loadBalancer:
        servers:
          - url: "http://dashboard:8080"

    nodered:
      loadBalancer:
        servers:
          - url: "http://opcua-nodered:1880"
    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"
    # usd:
    #   loadBalancer:
    #     servers:
    #       - url: "http://omniverse-kit:8443"
    spec:
      loadBalancer:
        servers:
          - url: "http://rag-mcp:49322"

  middlewares:
    spec-strip:
      stripPrefix:
        prefixes:
          - "/spec"
    dashboard-strip:
      stripPrefix:
        prefixes:
          - "/dashboard"
