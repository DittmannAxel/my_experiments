# Robot Digital Twin PoC — Phase 0 (Traefik + landing page).
# Routing config lives in traefik/dynamic.yml (file provider, not docker labels).
# Later phases append services here and uncomment the matching block in dynamic.yml.
name: robot-twin-poc

services:
  traefik:
    image: traefik:v3.3
    container_name: rt-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    networks:
      - stack
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ -S 2>&1 | grep -q HTTP || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  landing-page:
    build: ./landing-page
    container_name: rt-landing
    restart: unless-stopped
    networks:
      - stack

  opcua-server:
    build: ./opcua-server
    container_name: rt-opcua
    restart: unless-stopped
    environment:
      - OPCUA_USER=${OPCUA_USER:-axel}
      - OPCUA_PASSWORD=${OPCUA_PASSWORD:-changeme-please}
      - INJECT_ANOMALY=${INJECT_ANOMALY:-}
    ports:
      - "4840:4840"
    volumes:
      - opcua-certs:/app/certs
    networks:
      - stack

  opcua-nodered:
    build: ./opcua-nodered
    container_name: rt-nodered
    restart: unless-stopped
    depends_on:
      opcua-server:
        condition: service_healthy
    networks:
      - stack
    # No /data volume on purpose — flows.json + settings.js are baked
    # into the image so the dashboard is reproducible across rebuilds.

  bridge:
    build: ./bridge
    container_name: rt-bridge
    restart: unless-stopped
    depends_on:
      opcua-server:
        condition: service_healthy
    environment:
      - OPCUA_ENDPOINT=opc.tcp://opcua-server:4840/axel/robot
      - USD_STAGE_DIR=/stage
      - USD_ASSETS_DIR=/usd-assets
    volumes:
      - ./usd-assets:/usd-assets:ro
      - usd-stage:/stage
    networks:
      - stack

  influxdb:
    image: influxdb:2
    container_name: rt-influxdb
    restart: unless-stopped
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-changeme-please}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-axel}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-robot}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - stack
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  telegraf:
    image: telegraf:latest
    container_name: rt-telegraf
    restart: unless-stopped
    depends_on:
      opcua-server:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      - INFLUXDB_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-axel}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-robot}
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      - stack

  grafana:
    image: grafana/grafana-oss:latest
    container_name: rt-grafana
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-changeme-please}
      - GF_SERVER_ROOT_URL=https://${STACK_HOSTNAME:-stack.local}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - INFLUXDB_ORG=${INFLUXDB_ORG:-axel}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-robot}
      - INFLUXDB_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - stack
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/grafana/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  stack:
    name: stack
    driver: bridge

volumes:
  opcua-certs:
  usd-stage:
  influxdb-data:
  influxdb-config:
  grafana-data:
