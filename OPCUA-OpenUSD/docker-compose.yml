# Robot Digital Twin PoC — Phase 0 (Traefik + landing page only).
# Later phases extend this file with additional services.
name: robot-twin-poc

services:
  traefik:
    image: traefik:v3.1
    container_name: rt-traefik
    restart: unless-stopped
    command: []
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    networks:
      - stack
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "http://localhost:80/", "-S"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  landing-page:
    build: ./landing-page
    container_name: rt-landing
    restart: unless-stopped
    networks:
      - stack
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=stack"
      - "traefik.http.routers.landing.rule=Host(`${STACK_HOSTNAME:-stack.local}`) && PathPrefix(`/`)"
      - "traefik.http.routers.landing.priority=1"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls=true"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

networks:
  stack:
    name: stack
    driver: bridge
