# Robot Digital Twin PoC — Phase 0 (Traefik + landing page).
# Routing config lives in traefik/dynamic.yml (file provider, not docker labels).
# Later phases append services here and uncomment the matching block in dynamic.yml.
name: robot-twin-poc

services:
  traefik:
    image: traefik:v3.3
    container_name: rt-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    networks:
      - stack
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ -S 2>&1 | grep -q HTTP || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  landing-page:
    build: ./landing-page
    container_name: rt-landing
    restart: unless-stopped
    networks:
      - stack

networks:
  stack:
    name: stack
    driver: bridge
