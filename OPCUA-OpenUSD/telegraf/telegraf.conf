# Telegraf — OPC UA → InfluxDB v2 bridge for the Robot Twin PoC.
# Subscription-based (opcua_listener) so we get push, not poll.

[agent]
  interval = "1s"
  flush_interval = "1s"
  round_interval = false
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  omit_hostname = false
  debug = false

# ───────── INPUT — OPC UA subscription ─────────
[[inputs.opcua_listener]]
  name = "robot"
  endpoint = "opc.tcp://opcua-server:4840/axel/robot"
  connect_timeout = "10s"
  request_timeout = "5s"
  security_policy = "None"
  security_mode = "None"
  auth_method = "Anonymous"
  username = ""
  password = ""
  certificate = ""
  private_key = ""
  subscription_interval = "100ms"

  # Per-axis ActualPosition + MotorTemperature.
  [[inputs.opcua_listener.group]]
    name = "axis"
    namespace = "2"
    identifier_type = "s"

    [[inputs.opcua_listener.group.nodes]]
      name = "axis1_pos"
      identifier = "RobotController.MotionDevice.Axis1.ActualPosition"
      tags = [["axis", "1"], ["metric", "position"]]
    [[inputs.opcua_listener.group.nodes]]
      name = "axis2_pos"
      identifier = "RobotController.MotionDevice.Axis2.ActualPosition"
      tags = [["axis", "2"], ["metric", "position"]]
    [[inputs.opcua_listener.group.nodes]]
      name = "axis3_pos"
      identifier = "RobotController.MotionDevice.Axis3.ActualPosition"
      tags = [["axis", "3"], ["metric", "position"]]
    [[inputs.opcua_listener.group.nodes]]
      name = "axis4_pos"
      identifier = "RobotController.MotionDevice.Axis4.ActualPosition"
      tags = [["axis", "4"], ["metric", "position"]]
    [[inputs.opcua_listener.group.nodes]]
      name = "axis5_pos"
      identifier = "RobotController.MotionDevice.Axis5.ActualPosition"
      tags = [["axis", "5"], ["metric", "position"]]
    [[inputs.opcua_listener.group.nodes]]
      name = "axis6_pos"
      identifier = "RobotController.MotionDevice.Axis6.ActualPosition"
      tags = [["axis", "6"], ["metric", "position"]]

    [[inputs.opcua_listener.group.nodes]]
      name = "axis1_motor_temp"
      identifier = "RobotController.MotionDevice.Axis1.MotorTemperature"
      tags = [["axis", "1"], ["metric", "motor_temp"]]
    [[inputs.opcua_listener.group.nodes]]
      name = "axis2_motor_temp"
      identifier = "RobotController.MotionDevice.Axis2.MotorTemperature"
      tags = [["axis", "2"], ["metric", "motor_temp"]]
    [[inputs.opcua_listener.group.nodes]]
      name = "axis3_motor_temp"
      identifier = "RobotController.MotionDevice.Axis3.MotorTemperature"
      tags = [["axis", "3"], ["metric", "motor_temp"]]
    [[inputs.opcua_listener.group.nodes]]
      name = "axis4_motor_temp"
      identifier = "RobotController.MotionDevice.Axis4.MotorTemperature"
      tags = [["axis", "4"], ["metric", "motor_temp"]]
    [[inputs.opcua_listener.group.nodes]]
      name = "axis5_motor_temp"
      identifier = "RobotController.MotionDevice.Axis5.MotorTemperature"
      tags = [["axis", "5"], ["metric", "motor_temp"]]
    [[inputs.opcua_listener.group.nodes]]
      name = "axis6_motor_temp"
      identifier = "RobotController.MotionDevice.Axis6.MotorTemperature"
      tags = [["axis", "6"], ["metric", "motor_temp"]]

  # Scalars: ProgramState + CycleCounter
  [[inputs.opcua_listener.group]]
    name = "scalar"
    namespace = "2"
    identifier_type = "s"

    [[inputs.opcua_listener.group.nodes]]
      name = "program_state"
      identifier = "RobotController.ProgramState"
    [[inputs.opcua_listener.group.nodes]]
      name = "cycle_counter"
      identifier = "RobotController.CycleCounter"

# ───────── OUTPUT — InfluxDB v2 ─────────
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUXDB_ADMIN_TOKEN"
  organization = "$INFLUXDB_ORG"
  bucket = "$INFLUXDB_BUCKET"
